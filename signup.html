<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-box">

    <h1>Create Account</h1>

    <form action="/register" method="POST">

        <input type="text"
        name="username"
        placeholder="Username"
        required>

        <input type="password"
        name="password"
        placeholder="Password"
        required>

        <button type="submit">Sign Up</button>

    </form>

</div>

</body>

</html>
